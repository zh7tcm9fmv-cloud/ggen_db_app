<script>
// CDN URL from Flask - handles both local and deployed
const IMAGE_CDN = '{{ image_cdn }}'.replace(/\/+$/, '');

function imgUrl(path) {
    if (!path) return '';
    if (path.startsWith('http://') || path.startsWith('https://')) return path;
    if (IMAGE_CDN && path.startsWith('/static/images/')) {
        return IMAGE_CDN + '/images/' + path.substring('/static/images/'.length);
    }
    return path;
}

orter Data',stage_data:'Stage Data',view_effect_range:'View Effect Range',view_stage_map:'View Stage Map',hide_stage_map:'Hide Stage Map',supply_type:'Supply Type:',hp_support:'HP Support',atk_support:'Attack Support',tag_or:' or ',tag_results:'Items with Tag:',sortie_group:'Sortie Group',applies_to:'Applies To',recommended_cp:'Recommended CP',terrain:'Terrain',victory_conditions:'Victory Conditions',defeat_conditions:'Defeat Conditions',none:'None',npc_unit:'NPC Unit',npc_character:'NPC Character',npc_unit_abilities:'Unit Abilities',npc_unit_weapons:'Unit Weapons',npc_character_abilities:'Character Abilities',npc_character_skills:'Character Skills',difficulty_normal:'Normal',difficulty_hard:'Hard',difficulty_expert:'Expert',filter_diff_all:'All Difficulties',filter_diff_normal:'Normal',filter_diff_hard:'Hard',filter_diff_expert:'Expert',ally:'Ally',enemy:'Enemy'},
TW:{tab_char:'角色',tab_unit:'機體',tab_supporter:'支援人員',tab_stage:'永恆之路',search_char:'搜尋：名稱/系列/標籤/能力/技能',search_unit:'搜尋：名稱/系列/標籤/能力/',search_supporter:'搜尋：名稱/系列/標籤',search_stage:'用關卡ID或名稱搜尋...',per_page:'/頁',count_char:'位角色',count_unit:'台機體',count_supporter:'名支援人員',count_stage:'個關卡',empty_char:'未找到角色',empty_unit:'未找到機體',empty_supporter:'未找到支援人員',empty_stage:'未找到關卡',col_name:'名稱',col_rarity:'稀有度',col_role:'類型',col_series_tag:'系列/標籤',col_boost:'加成',col_ranged:'射擊',col_melee:'格鬥',col_awaken:'覺醒',col_defense:'守備',col_reaction:'反應',col_hp:'HP',col_en:'EN',col_atk:'攻擊',col_def:'防禦',col_mob:'機動',col_mov:'移動',col_stage_diff:'難度',col_stage_no:'編號',col_stage_cp:'推薦戰力',col_stage_terrain:'地形',sec_stats:'能力值',sec_terrain:'地形適性',sec_abilities:'能力',sec_skills:'技能',sec_leader_skill:'隊長技能',sec_active_skills:'支援人員技能',sec_weapons:'武裝',sec_weapon_list:'武裝列表',sec_mechanism:'機制',sec_sortie_restrictions:'出擊限制',sec_stage_map:'關卡地圖',sec_npc_details:'NPC資料',wp_weapon:'武裝',wp_type:'類型',wp_range:'射程',wp_power:'威力',wp_en:'EN',wp_acc:'命中',wp_crit:'暴擊',wp_ammo:'彈數',stat_ranged:'射擊',stat_melee:'格鬥',stat_awaken:'覺醒',stat_defense:'守備',stat_reaction:'反應',stat_hp:'HP',stat_en:'EN',stat_attack:'攻擊',stat_mobility:'機動',stat_move:'移動',terrain_space:'宇宙',terrain_atmo:'空中',terrain_ground:'地上',terrain_sea:'水上',terrain_underwater:'水中',role_attack:'攻擊型',role_defense:'防禦型',role_support:'支援型',role_all:'全部類型',role_filter_attack:'僅攻擊型',role_filter_defense:'僅防禦型',role_filter_support:'僅支援型',conditional_passive:'條件式被動',char_data:'角色資料',unit_data:'機體資料',supp_data:'支援人員資料',stage_data:'關卡資料',view_effect_range:'視圖效果範圍',view_stage_map:'查看地圖',hide_stage_map:'隱藏地圖',supply_type:'補給類型:',hp_support:'HP輔助',atk_support:'攻擊輔助',tag_or:' 或 ',tag_results:'包含標籤的:',sortie_group:'出擊群組',applies_to:'適用對象',recommended_cp:'推薦戰力',terrain:'地形',victory_conditions:'勝利條件',defeat_conditions:'敗北條件',none:'無',npc_unit:'NPC機體',npc_character:'NPC角色',npc_unit_abilities:'機體能力',npc_unit_weapons:'機體武裝',npc_character_abilities:'角色能力',npc_character_skills:'角色技能',difficulty_normal:'普通',difficulty_hard:'困難',difficulty_expert:'專家',filter_diff_all:'全部難度',filter_diff_normal:'普通',filter_diff_hard:'困難',filter_diff_expert:'專家',ally:'我方',enemy:'敵方'}};
const STAT_NAME_MAP={EN:{},TW:{'Ranged':'射擊','Melee':'格鬥','Awaken':'覺醒','Defense':'守備','Reaction':'反應','HP':'HP','EN':'EN','Attack':'攻擊','Mobility':'機動','Move':'移動'}};
const TERRAIN_NAME_MAP={EN:{},TW:{'Space':'宇宙','Atmospheric':'空中','Ground':'地上','Sea':'水上','Underwater':'水中'}};
const ROLE_NAME_MAP={EN:{'Attack':'Attack','Defense':'Defense','Support':'Support'},TW:{'Attack':'攻擊型','Defense':'防禦型','Support':'支援型'}};
const ROLE_CYCLE=['','1','2','3'];
const ROLE_LABELS={EN:{'':'All Roles','1':'Attack Only','2':'Defense Only','3':'Support Only'},TW:{'':'全部類型','1':'僅攻擊型','2':'僅防禦型','3':'僅支援型'}};
const RARITY_FRAME_MAP={'UR':'/static/images/UI/UI_Common_Tmb_Square_UR_Frame.png','SSR':'/static/images/UI/UI_Common_Tmb_Square_SSR_Frame.png','SR':'/static/images/UI/UI_Common_Tmb_Square_SR_Frame.png','R':'/static/images/UI/UI_Common_Tmb_Square_R_Frame.png','N':'/static/images/UI/UI_Common_Tmb_Square_None_Frame%20%236338.png'};
const LB_ICONS={'None':'/static/images/UI/UI_Common_Icon_Grade_M_None.png','Neutral':'/static/images/UI/UI_Common_Icon_Grade_M_Neutral.png','Max':'/static/images/UI/UI_Common_Icon_Grade_M_Max.png'};
function t(key){const lang=S.lang||'EN';return(T[lang]&&T[lang][key])||T.EN[key]||key}
function tStat(name){const m=STAT_NAME_MAP[S.lang];return(m&&m[name])||name}
function tTerrain(name){const m=TERRAIN_NAME_MAP[S.lang];return(m&&m[name])||name}
function tRole(name){const m=ROLE_NAME_MAP[S.lang];return(m&&m[name])||name}
function tRoleFilter(roleId){const m=ROLE_LABELS[S.lang]||ROLE_LABELS.EN;return m[roleId]||m['']}
const S={lang:'EN',languages:[],currentTab:'characters',characters:{page:1,sort:'rarity',dir:'desc',q:'',roleFilter:''},units:{page:1,sort:'rarity',dir:'desc',q:'',roleFilter:''},supporters:{page:1,sort:'rarity',dir:'desc',q:''},stages:{page:1,q:'',difficultyFilter:'ALL',sort:'stage_number',dir:'asc'},ft:null,currentDetailData:null,currentDetailType:null,conditionalPassiveActive:false,spActive:false,sspActive:false,_tagRarityFilter:'ALL',_tagAcqFilter:'ALL',_tagTargetType:'unit',_currentTagStr:'',_currentTagOp:'and',currentLbTier:3,currentWeaponLevels:{},stageMapExpanded:false,stageMapZoom:1,stageMapAutoFit:true};
document.addEventListener('DOMContentLoaded',async()=>{document.getElementById('brandLogoImg').src=imgUrl('/static/images/UI/IMG_Common_Logo_ETERNALBASE.png');await loadLangs();applyLang();buildTableHeaders();loadCharacters(1);loadUnits(1);loadSupporters(1);loadStages(1);setupKeys()});
async function loadLangs(){try{const r=await fetch('/api/languages');const d=await r.json();S.languages=d.languages||['EN'];S.lang=d.default||'EN';document.getElementById('langLabel').textContent=S.lang;renderLangDD()}catch(e){S.languages=['EN']}}
function renderLangDD(){document.getElementById('langDropdown').innerHTML=S.languages.map(l=>`<div class="lang-option ${l===S.lang?'selected':''}" onclick="selLang('${l}')">${l}</div>`).join('')}
function toggleLangDropdown(){document.getElementById('langDropdown').classList.toggle('active')}
function selLang(l){S.lang=l;document.getElementById('langLabel').textContent=l;document.getElementById('langDropdown').classList.remove('active');renderLangDD();applyLang();buildTableHeaders();updateRoleFilterButtons();loadCharacters(1);loadUnits(1);loadSupporters(1);loadStages(1)}
document.addEventListener('click',e=>{if(!e.target.closest('.lang-selector'))document.getElementById('langDropdown').classList.remove('active')});
function applyLang(){document.getElementById('navCharTab').textContent=t('tab_char');document.getElementById('navUnitTab').textContent=t('tab_unit');document.getElementById('navSuppTab').textContent=t('tab_supporter');document.getElementById('navStageTab').textContent=t('tab_stage');document.getElementById('tagTabChar').textContent=t('tab_char');document.getElementById('tagTabUnit').textContent=t('tab_unit');document.getElementById('charFilter').placeholder=t('search_char');document.getElementById('unitFilter').placeholder=t('search_unit');document.getElementById('suppFilter').placeholder=t('search_supporter');document.getElementById('stageFilter').placeholder=t('search_stage');document.getElementById('charEmptyText').textContent=t('empty_char');document.getElementById('unitEmptyText').textContent=t('empty_unit');document.getElementById('suppEmptyText').textContent=t('empty_supporter');document.getElementById('stageEmptyText').textContent=t('empty_stage');const pp=t('per_page');['charPerPage','unitPerPage','suppPerPage','stagePerPage'].forEach(id=>{document.getElementById(id).innerHTML=`<option value="25">25${pp}</option><option value="50" selected>50${pp}</option><option value="100">100${pp}</option>`});updateRoleFilterButtons();updateStageDifficultyFilterButtons()}
function updateRoleFilterButtons(){document.getElementById('charRoleFilterLabel').textContent=tRoleFilter(S.characters.roleFilter);document.getElementById('unitRoleFilterLabel').textContent=tRoleFilter(S.units.roleFilter);document.getElementById('charRoleFilterBtn').classList.toggle('active',S.characters.roleFilter!=='');document.getElementById('unitRoleFilterBtn').classList.toggle('active',S.units.roleFilter!=='')}
function cycleRoleFilter(type){const s=type==='characters'?S.characters:S.units;const ci=ROLE_CYCLE.indexOf(s.roleFilter);s.roleFilter=ROLE_CYCLE[(ci+1)%ROLE_CYCLE.length];updateRoleFilterButtons();if(type==='characters')loadCharacters(1);else loadUnits(1)}
function switchTab(tab){S.currentTab=tab;document.querySelectorAll('.nav-tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.toggle('active',x.id===`panel-${tab}`))}
function goHome(){closeModal();switchTab('characters')}
function setupKeys(){document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('tagModal').classList.contains('active'))closeTagModalForce();else closeModal()}})}
function debounceLoad(tab){clearTimeout(S.ft);S.ft=setTimeout(()=>{if(tab==='characters')loadCharacters(1);else if(tab==='units')loadUnits(1);else if(tab==='supporters')loadSupporters(1);else loadStages(1)},300)}
function buildTableHeaders(){const cs=S.characters,us=S.units,ss=S.supporters;document.getElementById('charThead').innerHTML=`<tr><th class="col-thum" style="cursor:default"></th><th class="col-name ${cs.sort==='name'?'sort-active':''}" onclick="sortCol('characters','name')">${t('col_name')} <span class="sort-arrow">${cs.sort==='name'?(cs.dir==='desc'?'▼':'▲'):'▲'}</span></th><th class="col-rarity ${cs.sort==='rarity'?'sort-active':''}" onclick="sortCol('characters','rarity')">${t('col_rarity')} <span class="sort-arrow">${cs.sort==='rarity'?(cs.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-role" style="cursor:default">${t('col_role')}</th><th class="col-stat ${cs.sort==='Ranged'?'sort-active':''}" onclick="sortCol('characters','Ranged')">${t('col_ranged')} <span class="sort-arrow">${cs.sort==='Ranged'?(cs.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-stat ${cs.sort==='Melee'?'sort-active':''}" onclick="sortCol('characters','Melee')">${t('col_melee')} <span class="sort-arrow">${cs.sort==='Melee'?(cs.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-stat ${cs.sort==='Awaken'?'sort-active':''}" onclick="sortCol('characters','Awaken')">${t('col_awaken')} <span class="sort-arrow">${cs.sort==='Awaken'?(cs.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-stat ${cs.sort==='Defense'?'sort-active':''}" onclick="sortCol('characters','Defense')">${t('col_defense')} <span class="sort-arrow">${cs.sort==='Defense'?(cs.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-stat ${cs.sort==='Reaction'?'sort-active':''}" onclick="sortCol('characters','Reaction')">${t('col_reaction')} <span class="sort-arrow">${cs.sort==='Reaction'?(cs.dir==='desc'?'▼':'▲'):'▼'}</span></th></tr>`;document.getElementById('unitThead').innerHTML=`<tr><th class="col-thum" style="cursor:default"></th><th class="col-name ${us.sort==='name'?'sort-active':''}" onclick="sortCol('units','name')">${t('col_name')} <span class="sort-arrow">${us.sort==='name'?(us.dir==='desc'?'▼':'▲'):'▲'}</span> k="sortCol('supporters','series_tag')">${t('col_series_tag')} <span class="sort-arrow">${ss.sort==='series_tag'?(ss.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-boost ${ss.sort==='boost'?'sort-active':''}" onclick="sortCol('supporters','boost')">${t('col_boost')} <span class="sort-arrow">${ss.sort==='boost'?(ss.dir==='desc'?'▼':'▲'):'▼'}</span></th><th class="col-skill" style="cursor:default">${t('sec_active_skills')}</th></tr>`;const st=S.stages;document.getElementById('stageThead').innerHTML=`<tr><th class="col-thum" style="cursor:default"></th><th class="col-diff" style="cursor:default">${t('col_stage_diff')}</th><th class="col-number ${st.sort==='stage_number'?'sort-active':''}" onclick="sortColStage('stage_number')">${t('col_stage_no')} <span class="sort-arrow">${st.sort==='stage_number'?(st.dir==='desc'?'▼':'▲'):'▲'}</span></th><th class="col-name" style="cursor:default">${t('col_name')}</th><th class="col-cp" style="cursor:default">${t('col_stage_cp')}</th><th class="col-terrain" style="cursor:default">${t('col_stage_terrain')}</th></tr>`}
async function loadCharacters(p=1){const s=S.characters;s.page=p;s.q=document.getElementById('charFilter').value.trim();const pp=document.getElementById('charPerPage').value;showLoad('char',true);try{const r=await fetch(`/api/characters?lang=${S.lang}&page=${p}&per_page=${pp}&sort=${s.sort}&dir=${s.dir}&q=${encodeURIComponent(s.q)}&role=${s.roleFilter}`);const d=await r.json();renderCharT(d);renderPag('char',d);document.getElementById('charCount').innerHTML=`<span>${d.total}</span> ${t('count_char')}`}catch(e){document.getElementById('charBody').innerHTML='';document.getElementById('charEmpty').style.display='block'}showLoad('char',false)}
async function loadUnits(p=1){const s=S.units;s.page=p;s.q=document.getElementById('unitFilter').value.trim();const pp=document.getElementById('unitPerPage').value;showLoad('unit',true);try{const r=await fetch(`/api/units?lang=${S.lang}&page=${p}&per_page=${pp}&sort=${s.sort}&dir=${s.dir}&q=${encodeURIComponent(s.q)}&role=${s.roleFilter}`);const d=await r.json();renderUnitT(d);renderPag('unit',d);document.getElementById('unitCount').innerHTML=`<span>${d.total}</span> ${t('count_unit')}`}catch(e){document.getElementById('unitBody').innerHTML='';document.getElementById('unitEmpty').style.display='block'}showLoad('unit',false)}
async function loadSupporters(p=1){const s=S.supporters;s.page=p;s.q=document.getElementById('suppFilter').value.trim();const pp=document.getElementById('suppPerPage').value;showLoad('supp',true);try{const r=await fetch(`/api/supporters?lang=${S.lang}&page=${p}&per_page=${pp}&sort=${s.sort}&dir=${s.dir}&q=${encodeURIComponent(s.q)}`);const d=await r.json();renderSuppT(d);renderPag('supp',d);document.getElementById('suppCount').innerHTML=`<span>${d.total}</span> ${t('count_supporter')}`}catch(e){document.getElementById('suppBody').innerHTML='';document.getElementById('suppEmpty').style.display='block'}showLoad('supp',false)}
async function loadStages(p=1){const s=S.stages;s.page=p;s.q=document.getElementById('stageFilter').value.trim();const pp=document.getElementById('stagePerPage').value;const df=s.difficultyFilter==='ALL'?'':s.difficultyFilter;showLoad('stage',true);try{const r=await fetch(`/api/stages?lang=${S.lang}&page=${p}&per_page=${pp}&q=${encodeURIComponent(s.q)}&difficulty=${encodeURIComponent(df)}&sort=${s.sort}&dir=${s.dir}`);const d=await r.json();renderStageT(d);renderPag('stage',d);document.getElementById('stageCount').innerHTML=`<span>${d.total}</span> ${t('count_stage')}`}catch(e){document.getElementById('stageBody').innerHTML='';document.getElementById('stageEmpty').style.display='block'}showLoad('stage',false)}
function showLoad(pfx,s){document.getElementById(`${pfx}Loading`).style.display=s?'flex':'none';document.getElementById(`${pfx}Empty`).style.display='none';if(s)document.getElementById(`${pfx}Body`).innerHTML=''}
function renderSkillTags(std){if(!std||!std.length)return'';return std.map(sk=>{let tags=sk.tags||[];if(!tags.length)return'';let sep='';if(sk.separator==='and')sep=`<span style="display:flex;align-items:center;color:#a855f7;font-weight:900;font-size:16px;margin:0 2px;">+</span>`;else if(sk.separator==='or')sep=`<span style="display:flex;align-items:center;color:#a855f7;font-weight:900;font-size:13px;margin:0 4px;">${t('tag_or')}</span>`;else sep='<span style="margin:0 2px;"> </span>';return tags.map(tag=>{let cn=tag.name||'',ct=tag.type||'',cTags,cOp;if(sk.separator==='and'){cTags=tags.map(tg=>tg.name).join(',');cOp='and'}else{cTags=cn;cOp='or'}let li='';if(ct==='unit')li='/static/images/UI/UI_Common_Icon_Category_MS_Main.png';else if(ct==='character')li='/static/images/UI/UI_Common_Icon_Category_Chara_Main.png';else li='/static/images/UI/UI_Common_Icon_Category_MS_Main.png';return`<div class="tag-composite" onclick="event.stopPropagation();openTagModal('${esc(cTags)}','${cOp}')" title="Click to view"><div class="tag-part-icon">${li?`<img class="tag-icon-fg" src="${imgUrl(li)}" alt="" onerror="this.style.display='none'">`:''}</div><div class="tag-part-value">${esc(cn)}</div></div>`}).join(sep)}).join('<div style="width:100%;height:6px;"></div>')}
function renderCharT(data){const tb=document.getElementById('charBody'),em=document.getElementById('charEmpty');if(!data.rows||!data.rows.length){tb.innerHTML='';em.style.display='block';return}em.style.display='none';tb.innerHTML=data.rows.map(r=>`<tr onclick="openDetail('character','${r.id}')"><td class="col-thum">${r.thum?`<img class="row-thum" src="${imgUrl(r.thum)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'row-thum-placeholder\\'>👤</div>'">`:'<div class="row-thum-placeholder">👤</div>'}</td><td class="col-name"><div class="name-cell"><span class="name-text">${esc(r.name)}</span></div></td><td class="col-rarity">${r.rarity_icon?`<img class="rarity-icon-cell" src="${imgUrl(r.rarity_icon)}" alt="${r.rarity}">`:`<span class="rarity-badge rarity-${r.rarity}">${r.rarity}</span>`}</td><td class="col-role">${r.role_icon?`<img class="role-icon-cell" src="${imgUrl(r.role_icon)}" alt="${r.role}" title="${tRole(r.role)}">`:`<span style="font-size:14px;color:var(--text-muted)">${tRole(r.role)}</span>`}</td><td class="col-stat"><span class="stat-value">${fmtN(r.Ranged)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.Melee)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.Awaken)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.Defense)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.Reaction)}</span></td></tr>`).join('')}
function renderUnitT(data){const tb=document.getElementById('unitBody'),em=document.getElementById('unitEmpty');if(!data.rows||!data.rows.length){tb.innerHTML='';em.style.display='block';return}em.style.display='none';tb.innerHTML=data.rows.map(r=>`<tr onclick="openDetail('unit','${r.id}')"><td class="col-thum">${r.thum?`<img class="row-thum" src="${imgUrl(r.thum)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'row-thum-placeholder\\'>🤖</div>'">`:'<div class="row-thum-placeholder">🤖</div>'}</td><td class="col-name"><div class="name-cell"><span class="name-text">${esc(r.name)}</span><span class="name-special-icons">${(r.special_icons||[]).map(ic=>`<img class="name-special-icon" src="${imgUrl(ic)}" alt="" onerror="this.style.display='none'">`).join('')}</span></div></td><td class="col-rarity">${r.rarity_icon?`<img class="rarity-icon-cell" src="${imgUrl(r.rarity_icon)}" alt="${r.rarity}">`:`<span class="rarity-badge rarity-${r.rarity}">${r.rarity}</span>`}</td><td class="col-role">${r.role_icon?`<img class="role-icon-cell" src="${imgUrl(r.role_icon)}" alt="${r.role}" title="${tRole(r.role)}">`:`<span style="font-size:14px;color:var(--text-muted)">${tRole(r.role)}</span>`}</td><td class="col-stat"><span class="stat-value">${fmtN(r.HP)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.EN)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.ATK)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.DEF)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.MOB)}</span></td><td class="col-stat"><span class="stat-value">${fmtN(r.MOV)}</span></td></tr>`).join('')}
function renderSuppT(data){const tb=document.getElementById('suppBody'),em=document.getElementById('suppEmpty');if(!data.rows||!data.rows.length){tb.innerHTML='';em.style.display='block';return}em.style.display='none';tb.innerHTML=data.rows.map(r=>`<tr onclick="openDetail('supporter','${r.id}')"><td class="col-thum">${r.thum?`<img class="row-thum" src="${imgUrl(r.thum)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'row-thum-placeholder\\'>🎧</div>'">`:'<div class="row-thum-placeholder">🎧</div>'}</td><td class="col-name"><div class="name-cell"><span class="name-text">${esc(r.name)}</span></div></td><td class="col-rarity">${r.rarity_icon?`<img class="rarity-icon-cell" src="${imgUrl(r.rarity_icon)}" alt="${r.rarity}">`:`<span class="rarity-badge rarity-${r.rarity}">${r.rarity}</span>`}</td><td class="col-tag"><div class="detail-tags-row" style="margin-top:0;align-items:center;">${renderSkillTags(r.skill_tag_data)}</div></td><td class="col-boost"><div class="skill-summary" style="-webkit-line-clamp:3;white-space:pre-wrap;">${esc(r.boost)}</div></td><td class="col-skill">${r.active_icon?`<img src="${imgUrl(r.active_icon)}" style="width:44px;height:44px;border-radius:4px;border:1px solid var(--border-color);background:var(--bg-input);object-fit:cover;margin:0 auto;display:block;" onerror="this.style.display='none'">`:'<div style="text-align:center;color:var(--text-muted)">-</div>'}</td></tr>`).join('')}
function renderStageT(data){const tb=document.getElementById('stageBody'),em=document.getElementById('stageEmpty');if(!data.rows||!data.rows.length){tb.innerHTML='';em.style.display='block';return}em.style.display='none';tb.innerHTML=data.rows.map(r=>{const ph=r.portrait?`<img class="row-thum" src="${imgUrl(r.portrait)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'row-thum-placeholder\\'>🗺️</div>'">`:'<div class="row-thum-placeholder">🗺️</div>';return`<tr onclick="openDetail('stage','${r.id}')"><td class="col-thum"><div class="stage-thum-wrap">${ph}</div></td><td class="col-diff"><span class="stage-diff-badge stage-diff-${esc(r.difficulty_code||'unknown')}">${esc(r.difficulty_name||'-')}</span></td><td class="col-number"><span class="stat-value">${fmtN(r.stage_number)}</span></td><td class="col-name"><div class="name-cell"><span class="name-text">${esc(r.name)}</span></div></td><td class="col-cp"><span class="stat-value">${fmtN(r.recommended_cp)}</span></td><td class="col-terrain"><span class="stat-value">${esc(r.terrain)}</span></td></tr>`}).join('')}
function sortCol(type,key){let s;if(type==='characters')s=S.characters;else if(type==='units')s=S.units;else s=S.supporters;if(s.sort===key){s.dir=s.dir==='desc'?'asc':'desc'}else{s.sort=key;s.dir=key==='name'?'asc':'desc'}buildTableHeaders();if(type==='characters')loadCharacters(1);else if(type==='units')loadUnits(1);else loadSupporters(1)}
function sortColStage(key){const s=S.stages;if(s.sort===key){s.dir=s.dir==='desc'?'asc':'desc'}else{s.sort=key;s.dir='asc'}buildTableHeaders();loadStages(1)}
function cycleStageDifficultyFilter(){const opts=['ALL','normal','hard','expert'];const ci=opts.indexOf(S.stages.difficultyFilter);S.stages.difficultyFilter=opts[(ci+1)%opts.length];updateStageDifficultyFilterButtons();loadStages(1)}
function updateStageDifficultyFilterButtons(){const df=S.stages.difficultyFilter;const lbl=df==='ALL'?t('filter_diff_all'):df==='normal'?t('filter_diff_normal'):df==='hard'?t('filter_diff_hard'):t('filter_diff_expert');document.getElementById('stageDiffFilterLabel').textContent=lbl;document.getElementById('stageDiffFilterBtn').classList.toggle('active',df!=='ALL')}
function renderPag(pfx,data){const el=document.getElementById(`${pfx}Pagination`);const{page,total_pages}=data;if(total_pages<=1){el.innerHTML='';return}let fn;if(pfx==='char')fn='loadCharacters';else if(pfx==='unit')fn='loadUnits';else if(pfx==='supp')fn='loadSupporters';else fn='loadStages';let h='';h+=`<button class="page-btn ${page<=1?'disabled':''}" ${page>1?`onclick="${fn}(${page-1})"`:''}>◀</button>`;const mx=7;let sp=Math.max(1,page-Math.floor(mx/2));let ep=Math.min(total_pages,sp+mx-1);if(ep-sp<mx-1)sp=Math.max(1,ep-mx+1);if(sp>1){h+=`<button class="page-btn" onclick="${fn}(1)">1</button>`;if(sp>2)h+=`<span class="page-info">…</span>`}for(let i=sp;i<=ep;i++)h+=`<button class="page-btn ${i===page?'active':''}" onclick="${fn}(${i})">${i}</button>`;if(ep<total_pages){if(ep<total_pages-1)h+=`<span class="page-info">…</span>`;h+=`<button class="page-btn" onclick="${fn}(${total_pages})">${total_pages}</button>`}h+=`<button class="page-btn ${page>=total_pages?'disabled':''}" ${page<total_pages?`onclick="${fn}(${page+1})"`:''}>▶</button>`;el.innerHTML=h}
function toggleStatState(type){if(type==='sp'){if(S.spActive){S.spActive=false}else{S.spActive=true;S.sspActive=false}}else if(type==='ssp'){if(S.sspActive){S.sspActive=false}else{S.sspActive=true;S.spActive=false}}const spBtn=document.getElementById('spToggleBtn');const spBtnChar=document.getElementById('spToggleBtnChar');const sspBtn=document.getElementById('sspToggleBtn');if(spBtn)spBtn.classList.toggle('active',S.spActive);if(spBtnChar)spBtnChar.classList.toggle('active',S.spActive);if(sspBtn)sspBtn.classList.toggle('active',S.sspActive);updateDetailDynamicSections(S.currentDetailType)}
function updateLbTier(val){S.currentLbTier=parseInt(val,10);document.querySelectorAll('.lb-icon-btn').forEach(b=>b.classList.remove('active'));const ab=document.querySelector(`.lb-icon-btn[data-val="${val}"]`);if(ab)ab.classList.add('active');updateDetailDynamicSections(S.currentDetailType)}
function switchWeaponLevel(wid,level){S.currentWeaponLevels[wid]=parseInt(level,10);const d=S.currentDetailData;document.getElementById('detailWeaponsContainer').innerHTML=renderWeaponsDynamic(d.weapons,d.is_large,S.sspActive)}
function openTagModal(ts,op){const tm=document.getElementById('tagModal');S._currentTagStr=ts;S._currentTagOp=op;S._tagTargetType=(S.currentDetailType==='character')?'character':'unit';document.getElementById('tagTabUnit').classList.toggle('active',S._tagTargetType==='unit');document.getElementById('tagTabChar').classList.toggle('active',S._tagTargetType==='character');tm.classList.add('active');document.body.style.overflow='hidden';S._tagRarityFilter='ALL';S._tagAcqFilter='ALL';let ds=ts.split(',').join(op==='and'?' + ':` ${t('tag_or')} `);document.getElementById('tagModalTitle').innerHTML=`${t('tag_results')} <span style="color:#fff;padding:2px 10px;background:rgba(0,212,255,0.2);border:1px solid rgba(0,212,255,0.4);border-radius:12px;font-size:16px;">${esc(ds)}</span>`;fetchAndRenderTagModal()}

async function fetchAndRenderTagModal(){const tb=document.getElementById('tagModalBody');tb.innerHTML='<div class="loading-overlay"><div class="spinner"></div></div>';try{const ep=S._tagTargetType==='character'?'/api/tag_characters':'/api/tag_units';const r=await fetch(`${ep}?lang=${S.lang}&tags=${encodeURIComponent(S._currentTagStr)}&op=${S._currentTagOp}`);const d=await r.json();let h=`<div class="tag-rarity-filter"><button class="tag-rarity-btn active" data-filter-type="rarity" onclick="filterTagRarity('ALL',this)">All</button><button class="tag-rarity-btn" data-filter-type="rarity" onclick="filterTagRarity('UR',this)">UR</button><button class="tag-rarity-btn" data-filter-type="rarity" onclick="filterTagRarity('SSR',this)">SSR</button><button class="tag-rarity-btn" data-filter-type="rarity" onclick="filterTagRarity('SR',this)">SR</button><button class="tag-rarity-btn" data-filter-type="rarity" onclick="filterTagRarity('R',this)">R</button><button class="tag-rarity-btn" data-filter-type="rarity" onclick="filterTagRarity('N',this)">N</button><span style="width:1px;height:20px;background:var(--border-color);margin:0 6px;flex-shrink:0;"></span><button class="tag-rarity-btn active" data-filter-type="acq" onclick="filterTagAcq('ALL',this)">All</button><button class="tag-rarity-btn" data-filter-type="acq" onclick="filterTagAcq('GACHA',this)">Gacha</button><button class="tag-rarity-btn" data-filter-type="acq" onclick="filterTagAcq('NON_GACHA',this)">Non-Gacha</button></div>`;let any=false;let ih='<div id="tagUnitsWrapper">';['1','2','3'].forEach(rId=>{const items=d[rId];if(items&&items.length>0){any=true;const rim={'1':'/static/images/UI/UI_Common_TypeIcon_Attack_M.png','2':'/static/images/UI/UI_Common_TypeIcon_Defense_M.png','3':'/static/images/UI/UI_Common_TypeIcon_Ranged_M.png'};const rnm={'1':tRole('Attack'),'2':tRole('Defense'),'3':tRole('Support')};const ph=S._tagTargetType==='character'?'👤':'🤖';ih+=`<div class="tag-role-group"><div class="tag-role-title"><img src="${imgUrl(rim[rId])}" alt=""> ${esc(rnm[rId])}</div><div class="tag-unit-grid">${items.map(u=>`<div class="tag-unit-item" data-rarity="${u.rarity}" data-acq="${u.acquisition_route||'0'}" onclick="openDetail('${S._tagTargetType}','${u.id}');closeTagModalForce();"><div class="tag-unit-icon-wrapper">${u.thum?`<img class="tmb-inner" src="${imgUrl(u.thum)}" loading="lazy">`:`<div class="tmb-inner" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:20px;">${ph}</div>`}<img class="tmb-frame" src="${imgUrl(RARITY_FRAME_MAP[u.rarity]||RARITY_FRAME_MAP['N'])}"></div><div class="tag-unit-name">${esc(u.name)}</div></div>`).join('')}</div></div>`}});ih+='</div>';if(!any)h+=`<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:16px;">No results found.</div>`;else h+=ih;tb.innerHTML=h;applyTagFilters()}catch(e){tb.innerHTML=`<div style="text-align:center;padding:40px;color:var(--accent-red);">Error loading data.</div>`}}

function updateDetailDynamicSections(type){const d=S.currentDetailData;if(type!=='supporter'&&type!=='stage')document.getElementById('detailStatsWrapper').innerHTML=renderStatsWrapper(d,type);if(type==='character'){document.getElementById('detailAbilitiesContainer').innerHTML=renderAbilsDynamic(d.abilities,t('sec_abilities'),false,S.spActive);document.getElementById('detailSkillsContainer').innerHTML=renderSkills(d.skills,S.spActive)}else if(type==='unit'){document.getElementById('detailAbilitiesContainer').innerHTML=renderAbilsDynamic(d.abilities,t('sec_abilities'),S.sspActive,false);document.getElementById('detailWeaponsContainer').innerHTML=renderWeaponsDynamic(d.weapons,d.is_large,S.sspActive);document.getElementById('detailMechanismsContainer').innerHTML=renderMechanisms(d.mechanisms);const tr=document.getElementById('detailUnitTerrainRow');if(tr){const base=d.terrain||[];const ter=S.sspActive&&(d.terrain_ssp&&d.terrain_ssp.length)?d.terrain_ssp:base;const hasTerrainEnh=!!(S.sspActive&&(d.has_terrain_enhancement===true||(d.terrain_ssp&&d.terrain&&d.terrain_ssp.some((ts,i)=>ts.level!==(d.terrain[i]?.level??-1)))));tr.innerHTML=renderHeaderTerrain(ter,S.sspActive,hasTerrainEnh)}}else if(type==='supporter'){let lh='';if(d.leader_skills&&d.leader_skills.length){lh=`<div class="detail-section"><div class="section-title">${t('sec_leader_skill')}</div><div class="ability-list">${d.leader_skills.map(ls=>{let ts2=ls.tags.map(t=>t.name).join(',');return`<div class="ability-item" style="flex-direction:column;gap:10px;cursor:pointer;" onclick="openTagModal('${esc(ts2)}','${ls.separator}')"><div class="ability-detail" style="margin:0;">${esc(ls.desc)}</div>${ls.tags&&ls.tags.length?`<div class="detail-tags-row" style="margin-top:0;align-items:center;">${renderSkillTags([{tags:ls.tags,separator:ls.separator}])}</div>`:''}</div>`}).join('')}</div></div>`}document.getElementById('detailLeaderSkillContainer').innerHTML=lh;let ah='';if(d.active_skills&&d.active_skills.length){ah function renderStatsWrapper(d,type){let hcf=type==='character'?d.has_ex_stats:d.has_cond_stats;let sr,bs;if(type==='unit'){const td=(d.lb_data&&d.lb_data[S.currentLbTier])||(d.stats&&{stats_no_cond:d.stats,stats_with_cond:d.stats,sp_stats_no_cond:d.stats,sp_stats_with_cond:d.stats,ssp_stats_no_cond:d.stats,ssp_stats_with_cond:d.stats});if(!td)return'';if(d.has_sp){if(S.sspActive){sr=S.conditionalPassiveActive?td.ssp_stats_with_cond:td.ssp_stats_no_cond;bs=td.ssp_stats_no_cond}else if(S.spActive){sr=S.conditionalPassiveActive?td.sp_stats_with_cond:td.sp_stats_no_cond;bs=td.sp_stats_no_cond}else{sr=S.conditionalPassiveActive?td.stats_with_cond:td.stats_no_cond;bs=td.stats_no_cond}}else{sr=S.conditionalPassiveActive?td.stats_with_cond:td.stats_no_cond;bs=td.stats_no_cond}}else{if(d.has_sp){if(S.spActive){sr=S.conditionalPassiveActive?d.sp_stats_with_ex:d.sp_stats;bs=d.sp_stats}else{sr=S.conditionalPassiveActive?d.stats_with_ex:d.stats;bs=d.stats}}else{sr=S.conditionalPassiveActive?d.stats_with_ex:d.stats;bs=d.stats}}let th='';if(hcf)th=`<div class="conditional-toggle" style="justify-content:flex-end;margin-bottom:8px;"><label><input type="checkbox" onchange="toggleConditionalPassive(this.checked)" ${S.conditionalPassiveActive?'checked':''}><span class="toggle-switch"></span><span class="toggle-label">${t('conditional_passive')}</span></label></div>`;return`${th}<div class="stats-grid">${sr.map((s,i)=>{const b=bs[i];const hcb=S.conditionalPassiveActive&&hcf&&s.total>b.total;let eb='';if(s.bonus>0){const showSsp=(type==='unit'&&S.sspActive&&s.name==='Move');eb=`<div class="stat-card-bonus">${showSsp?`<img src="${imgUrl('/static/images/UI/UI_Common_Icon_Ssp.png')}" alt="SSP" style="height:14px;vertical-align:-2px;margin-right:4px;" onerror="this.style.display='none'">`:''}+${fmtN(s.bonus)}</div>`}return`<div class="stat-card ${hcb?'has-cond-bonus':''}"><div class="stat-card-label">${esc(tStat(s.name))}</div><div class="stat-card-value ${hcb?'has-bonus-val':''}">${fmtN(s.t function _stageMapViewWindow(md){
  const w=md.width||0,h=md.height||0,units=md.units||[];
  if(!w||!h||!units.length)return {minX:1,maxX:w||1,minY:1,maxY:h||1};
  let mnX=999,mxX=-1,mnY=999,mxY=-1;
  units.forEach(un=>{
    const cls=un.cells||[{x:un.x,y:un.y}];
    cls.forEach(cl=>{
      const cx=Number(cl.x)+1,cy=Number(cl.y)+1;
      if(cx<mnX)mnX=cx;if(cx>mxX)mxX=cx;if(cy<mnY)mnY=cy;if(cy>mxY)mxY=cy

function _stageMapBounds(){

function fitStageMapToUnits(centerAfter){
  const c=document.getElementById('stageMapGridWrap');
  if(!c){if(centerAfter)focusStageMap();return}
  const md=S.currentDetailData?.map_data||{};
  const win=_stageMapViewWindow(md);
  if(!win){c.scrollLeft=0;c.scrollTop=0;return}

  // Compute fit using real layout: cell(50*z) + gap(2) + paddings.
  const baseCell=50;
  const gap=2;
  const contPad=20*2; // map-grid-container padding
  const gridPad=15*2; // map-grid padding
  const extraPad=8;  // breathing room
  const bw=(win.maxX-win.minX+1),bh=(win.maxY-win.minY+1);
  const availW=Math.max(80,c.clientWidth-(contPad+gridPad+extraPad));
  const availH=Math.max(80,c.clientHeight-(contPad+gridPad+extraPad));
  const cellPxW=Math.floor((availW-((bw-1)*gap))/bw);
  const cellPxH=Math.floor((availH-((bh-1)*gap))/bh);
  const cellPx=Math.max(10,Math.min(cellPxW,cellPxH));
  const z=cellPx/baseCell;

  // Slightly zoom out so edges aren't tight.
  S.stageMapZoom=Math.max(.4,Math.min(1.4,z*.98));
  if(S.currentDetailType==='stage'){
    document.getElementById('detailStageMapContainer').innerHTML=renderStageMapSection(S.currentDetailData);
  }
  if(centerAfter)setTimeout(()=>{const cc=document.getElementById('stageMapGridWrap');if(cc){cc.scrollLeft=0;cc.scrollTop=0}},60)
}

nerror="this.style.display='none'">`:''}`}${x.is_ssp_weapon?`<img class="ssp-weapon-badge" src="${imgUrl('/static/images/UI/UI_Common_Icon_Ssp.png')}" alt="SSP" onerror="this.style.display='none'">`:(he?`<img class="ssp-enhance-badge" src="${imgUrl('/static/images/UI/UI_Common_Icon_Ssp.png')}" alt="SSP" onerror="this.style.display='none'">`:'')}${x.is_preemptive?`<img class="preemptive-badge" src="${imgUrl('/static/images/UI/UI_Common_Icon_PreemptiveAttack.png')}" alt="" onerror="this.style.display='none'">`:''}</div><div class="weapon-name-area"><div class="weapon-name-text">${esc(x.name)}</div><div class="weapon-attack-types">${(x.attack_types||[]).map(at=>at.is_supply?`<span style="font-size:12px;color:var(--accent-cyan);font-weight:600;display:flex;align-items:center;gap:4px;">${t('supply_type')} <img class="weapon-attack-type-icon" src="${imgUrl(at.icon)}" alt="${at.label}"> MP</span>`:`<img class="weapon-attack-type-icon" src="${imgUrl(at.icon)}" alt="${at.label}" title="${at.label}">`).join('')}</div></div></div>${lb}</div><div class="weapon-card-stats"><div class="weapon-stat-item"><div class="weapon-stat-label">${t('wp_range')}</div><div class="weapon-stat-value ${rac}">${x.min_range}-${pr}</div></div><div class="weapon-stat-item"><div class="weapon-stat-label">${t('wp_power')}</div><div class="weapon-stat-value ${pc}">${fmtN(pp)}</div></div><div class="weapon-stat-item"><div class="weapon-stat-label">${t('wp_en')}</div><div class="weapon-stat-value">${ld.en}</div></div><div class="weapon-stat-item"><div class="weapon-stat-label">${t('wp_acc')}</div><div class="weapon-stat-value">${ld.accuracy}%</div></div><div class="weapon-stat-item"><div class="weapon-stat-label">${t('wp_crit')}</div><div class="weapon-stat-value">${ld.critical}%</div></div>${pa>0?`<div class="weapon-stat-item"><div class="weapon-stat-label">${t('wp_ammo')}</div><div class="weapon-stat-value ${ac2}">${pa}</div></div>`:''}</div>${(pt.length)||(x.usage_restrictions&&x.usage_restrictions.length)||x.is_map?`<div class="weapon-card-body">${pt.length?`<div>${pt.map(tr=>`<div class="weapon-trait-item">${esc(tr)}</div>`).join('')}</div>`:''}${x.usage_restrictions&&x.usage_restrictions.length?`<div class="weapon-restrictions-list">${x.usage_restrictions.map(r=>`<div class="weapon-restriction-item">${esc(r)}</div>`).join('')}</div>`:''}${x.is_map?`<button class="toggle-map-btn" onclick="event.stopPropagation();toggleMapGrid('${x.id}')"><span>${t('view_effect_range')}</span></button><div id="map-${x.id}" class="map-grid-container">${renderMapGrid(x,isLarge)}</div>`:''}</div>`:''}</div>`});h+=`</div></div>`;return h}
function renderMapGrid(weapon,isLarge){
  let ec=weapon.map_coords||[],sc=weapon.shooting_coords||[],hs=sc.length>0;
  if(!ec.length)return'<div style="color:var(--text-muted);font-size:12px;text-align:center;margin-top:8px;">No data.</div>';

  if(isLarge){
    let exp=c=>{
      let e=[];
      c.forEach(cc=>{e.push({x:cc.x,y:cc.y});e.push({x:cc.x+1,y:cc.y})});
      return e.filter((v,i,a)=>a.findIndex(t2=>(t2.x===v.x&&t2.y===v.y))===i)
    };
    ec=exp(ec);sc=exp(sc)
  }

  let t1=false,t2=false,t3=false;
  if(!hs)t1=true;
  else if(weapon.is_dash)t3=true;
  else{
    let md=Math.min(...sc.map(c=>Math.abs(c.x)+Math.abs(c.y)));
    let eto=ec.some(c=>c.x===0&&c.y===0);
    if(md<=1&&!eto&&sc.length>1)t3=true;
    else t2=true
  }

  let tx=0,ty=0,ex2=0,ey=0;
  if(t3){
    let ac=ec.concat(sc);
    let my=Math.max(...ac.map(c=>c.y));
    ey=isLarge?my+2:my+1
  }else if(t2){
    let nc=sc.filter(c=>c.x===0);
    if(nc.length>0)ty=Math.max(...nc.map(c=>c.y));
    else{
      ty=Math.max(...sc.map(c=>c.y));
      let tc=sc.find(c=>c.y===ty);
      if(tc)tx=tc.x
    }
  }

  let mnx=0,mxx=0,mny=0,mxy=0;
  let uf=isLarge?[{x:0,y:0},{x:1,y:0},{x:0,y:-1},{x:1,y:-1}]:[{x:0,y:0}];
  if(t2){uf=isLarge?[{x:tx,y:ty},{x:tx+1,y:ty},{x:tx,y:ty-1},{x:tx+1,y:ty-1}]:[{x:tx,y:ty}]}
  uf.forEach(c=>{if(c.x<mnx)mnx=c.x;if(c.x>mxx)mxx=c.x;if(c.y<mny)mny=c.y;if(c.y>mxy)mxy=c.y});
  ec.forEach(c=>{let x=t2?c.x+tx:c.x,y=t2?c.y+ty:c.y;if(x<mnx)mnx=x;if(x>mxx)mxx=x;if(y<mny)mny=y;if(y>mxy)mxy=y});
  if(t2||t3){
    sc.forEach(c=>{if(c.x<mnx)mnx=c.x;if(c.x>mxx)mxx=c.x;if(c.y<mny)mny=c.y;if(c.y>mxy)mxy=c.y});
    if(t2&&ty>mxy)mxy=ty
  }
  if(t3){
    let ef=isLarge?[{x:ex2,y:ey},{x:ex2+1,y:ey},{x:ex2,y:ey-1},{x:ex2+1,y:ey-1}]:[{x:ex2,y:ey}];
    ef.forEach(c=>{if(c.x<mnx)mnx=c.x;if(c.x>mxx)mxx=c.x;if(c.y<mny)mny=c.y;if(c.y>mxy)mxy=c.y})
  }

  let aw=mxx-mnx+1,pl=0,pr2=0,fc=0;
  if(aw<3){fc=9;let tp=9-aw;pl=Math.floor(tp/2);pr2=Math.ceil(tp/2)}
  else if(aw>=8){pl=1;pr2=1;fc=aw+2}
  else{pl=aw;pr2=aw;fc=aw*3}

  let fmnx=mnx-pl,fmxx=mxx+pr2;
  let ah2=mxy-mny+1,py=Math.max(Math.floor(ah2/3),1);
  let fmny=mny-py,fmxy=mxy+py,fr=fmxy-fmny+1;

  let uxMin=0,uxMax=0,uyMin=0,uyMax=0;
  if(t2){uxMin=tx;uxMax=isLarge?tx+1:tx;uyMin=isLarge?ty-1:ty;uyMax=ty}
  else{uxMin=0;uxMax=isLarge?1:0;uyMin=isLarge?-1:0;uyMax=0}
  if(fc>19){let df=fc-19;let cl=Math.floor(df/2),cr=df-cl;cl=Math.min(cl,Math.max(0,uxMin-fmnx));cr=Math.min(cr,Math.max(0,fmxx-uxMax));fmnx+=cl;fmxx-=cr;fc=19}
  if(fr>19){let df=fr-19;let cb=Math.floor(df/2),ct=df-cb;cb=Math.min(cb,Math.max(0,uyMin-fmny));ct=Math.min(ct,Math.max(0,fmxy-uyMax));fmny+=cb;fmxy-=ct;fr=19}

  const step=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_StepMarker.png');
  let html=`<div class="map-grid" style="grid-template-columns:repeat(${fc},24px);grid-template-rows:repeat(${fr},24px);">`;

  for(let r=0;r<fr;r++){
    let cy=fmxy-r;
    for(let c=0;c<fc;c++){
      let cx=fmnx+c;
      let iu=false,im=false,its=false,ieb=false,iem=false,ie=false,isp=false;

      if(t2){
        if(isLarge){iu=(cx===tx||cx===tx+1)&&(cy===ty||cy===ty-1);im=(cx===tx&&cy===ty)}
        else{iu=(cx===tx&&cy===ty);im=iu}
      }else{
        if(isLarge){iu=(cx===0||cx===1)&&(cy===0||cy===-1);im=(cx===0&&cy===0)}
        else{iu=(cx===0&&cy===0);im=iu}
      }

      if(t2){
        its=(cx===tx&&cy===ty);
        ie=ec.some(e=>(e.x+tx===cx)&&(e.y+ty===cy));
        isp=sc.some(s=>s.x===cx&&s.y===cy)
      }else if(t3){
        if(isLarge){ieb=(cx===ex2||cx===ex2+1)&&(cy===ey||cy===ey-1);iem=(cx===ex2&&cy===ey)}
        else{ieb=(cx===ex2&&cy===ey);iem=ieb}
        ie=ec.some(e=>e.x===cx&&e.y===cy);
        isp=sc.some(s=>s.x===cx&&s.y===cy)
      }else{
        ie=ec.some(e=>e.x===cx&&e.y===cy)
      }

      let bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Nomal.png'),mh='',oh='';
      let ls=isLarge?'position:absolute;width:48px;height:48px;top:0;left:0;z-index:2;object-fit:contain;':'position:absolute;top:0;left:0;width:24px;height:24px;z-index:2;';

      if(t3){
        if(iu){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Nega.png');
          if(im)mh=`<img src=\"${imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_UnitMarker_Moving.png')}\" alt=\"\" style=\"${ls}\">`
        }else if(ieb){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Moving.png');
          if(iem)mh=`<img src=\"${imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_UnitMarker_Moving.png')}\" alt=\"\" style=\"${ls}\">`
        }else if(ie||isp){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Posi.png')
        }

        // Dash path "white arrows": higher contrast, and only in the center column.
        if((ie||isp)&&!iu&&!ieb&&cx===0){
          const stepLs=`${ls.replace('z-index:2;','z-index:1;')}filter:drop-shadow(0 0 2px rgba(0,0,0,.95)) drop-shadow(0 0 6px rgba(255,255,255,.55)) brightness(1.35) contrast(1.35);`;
          oh=`<img src=\"${step}\" alt=\"\" style=\"${stepLs}\">`
        }
      }else if(t2){
        if(iu){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Nega.png');
          if(im)mh=`<img src=\"${imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_UnitMarker_Nega.png')}\" alt=\"\" style=\"${ls}\">`
        }else if(its){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Posi.png');
          mh=`<img src=\"${imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_SelectMarker_Nega.png')}\" alt=\"\" style=\"${ls}\">`
        }else if(ie){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Posi.png')
        }else if(isp){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Nega.png')
        }
      }else{
        if(iu){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Nega.png');
          if(im)mh=`<img src=\"${imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_UnitMarker_Moving.png')}\" alt=\"\" style=\"${ls}\">`
        }else if(ie){
          bi=imgUrl('/static/images/UI/Sprite/UI_Common_Dialog_Block_Posi.png')
        }
      }

      html+=`<div class=\"map-cell\" style=\"width:24px;height:24px;position:relative;\"><img src=\"${bi}\" alt=\"\" style=\"width:24px;height:24px;position:absolute;top:0;left:0;object-fit:cover;display:block;z-index:0;\" onerror=\"this.style.display='none'\">${oh}${mh}</div>`
    }
  }

  html+='</div>';
  return html
}
function esc(s){if(s===null||s===undefined)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function escJs(s){return String(s??'').replace(/\\\\/g,'\\\\\\\\').replace(/'/g,"\\\\'").replace(/\\r/g,'\\\\r').replace(/\\n/g,'\\\\n')}
function scrollToNpc(id){try{const el=document.getElementById('npc-'+String(id));if(!el)return;el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.add('npc-card-highlight');setTimeout(()=>el.classList.remove('npc-card-highlight'),1200)}catch(e){}}
function fmtN(n){return n!=null?Number(n).toLocaleString():'0'}
</script>
